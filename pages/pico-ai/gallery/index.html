<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projection Chamber — Defocus Model</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: system-ui, sans-serif;
}

/* ===================== BASE FIELD ===================== */
body {
  min-height: 100dvh;

  background: radial-gradient(circle at center,
    #0f0f0f 0%,
    #000 70%,
    #000 100%);
}

/* ===================== STAGE ===================== */
.stage {
  min-height: 100dvh;

  display: flex;
  flex-direction: column;

  align-items: center;
  justify-content: flex-start;

  padding-top: 2vh;
  padding-bottom: 2vh;

  box-sizing: border-box;
}

/* ===================== PROJECTOR ===================== */
.projector {
  width: min(1100px, 92vw);

  height: min(72vh, 900px);

  position: relative;
  overflow: hidden;

  background: #000;

  box-shadow:
    0 80px 220px rgba(0,0,0,0.9),
    inset 0 0 100px rgba(255,255,255,0.03);

  animation: breathing 14s ease-in-out infinite;
}

/* ===================== IMAGE ===================== */
.projector img {
  width: 100%;
  height: 100%;
  object-fit: contain;

  filter:
    contrast(1.18)
    saturate(1.05)
    brightness(1.03);

  transform: scale(1.01);

  transition: filter 0.25s ease;
}

/* ===================== VIGNETTE ===================== */
.projector::before {
  content: "";
  position: absolute;
  inset: -10%;

  background: radial-gradient(circle at center,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.25) 45%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.85) 100%);

  pointer-events: none;
  z-index: 5;
}

/* ===================== FLICKER ===================== */
.flicker {
  position: absolute;
  inset: 0;
  z-index: 6;
  pointer-events: none;

  background: white;
  opacity: 0;

  animation: flicker 3s infinite;
}

@keyframes flicker {
  0%   { opacity: 0; }
  4%   { opacity: 0.06; }
  8%   { opacity: 0; }
  12%  { opacity: 0.08; }
  20%  { opacity: 0.02; }
  35%  { opacity: 0.05; }
  60%  { opacity: 0.03; }
  100% { opacity: 0; }
}

/* ===================== SCRATCHES ===================== */
#scratchCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 8;
  pointer-events: none;
}

/* ===================== DUST ===================== */
.dust {
  position: fixed;

  width: 2px;
  height: 2px;

  background: rgba(255,255,255,0.2);

  border-radius: 50%;
  pointer-events: none;

  animation: float linear infinite;

  z-index: 7;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }

  10% {
    opacity: 0.4;
  }

  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

/* ===================== CONTROLS ===================== */
.controls {
  margin-top: 14px;

  text-align: center;
  color: white;

  z-index: 9999;
  position: relative;
}

button {
  padding: 8px 14px;
  margin: 0 6px;

  border: 1px solid rgba(255,255,255,0.35);

  background: black;
  color: white;

  cursor: pointer;
}

#label {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.75;
}

/* ===================== BREATHING ===================== */
@keyframes breathing {
  0%   { transform: scale(1.00); }
  50%  { transform: scale(1.01); }
  100% { transform: scale(1.00); }
}

/* ===================== HEAVY DEFOCUS ===================== */
.blur {
  filter:
    blur(18px)
    contrast(1.1)
    brightness(1.05) !important;
}

/* ===================== LANDSCAPE MOBILE FIX ===================== */
@media (orientation: landscape) and (max-height: 600px) {

  .projector {
    height: 58vh;
  }

  .controls {
    margin-top: 6px;
  }

  button {
    padding: 6px 10px;
    font-size: 14px;
  }

  #label {
    font-size: 11px;
    margin-top: 4px;
  }
}
</style>
</head>

<body>

<canvas id="scratchCanvas"></canvas>

<div class="stage">

  <div class="projector">
    <div class="flicker"></div>

    <img id="viewer" src="" />
  </div>

  <div class="controls">
    <button onclick="prev()">◀ Prev</button>
    <button onclick="next()">Next ▶</button>

    <div id="label"></div>
  </div>

</div>

<script>
const frames = [
  "frame01.jpg","frame02.jpg","frame03.jpg","frame04.jpg","frame05.jpg",
  "frame06.jpg","frame07.jpg","frame08.jpg","frame09.jpg","frame10.jpg",
  "frame11.jpg","frame12.jpg","frame13.png","frame14.png","frame15.jpg",
  "frame16.jpg","frame17.jpg","frame18.jpg","frame19.jpg","frame20.jpg"
];

let index = 0;

const img = document.getElementById("viewer");
const label = document.getElementById("label");

/* ===================== IMAGE DISPLAY ===================== */
function show(i) {
  index = (i + frames.length) % frames.length;

  img.src = frames[index];

  label.textContent =
    `${index + 1} / ${frames.length} — ${frames[index]}`;

  triggerFocusEvent();
}

/* ===================== RANDOM HEAVY DEFOCUS ===================== */
function triggerFocusEvent() {

  const shouldBlur = Math.random() < 0.35;

  if (shouldBlur) {

    img.classList.add("blur");

    const duration =
      300 + Math.random() * 1200;

    setTimeout(() => {
      img.classList.remove("blur");
    }, duration);
  }
}

/* ===================== NAVIGATION ===================== */
function next() {
  show(index + 1);
}

function prev() {
  show(index - 1);
}

/* keyboard support */
document.addEventListener("keydown", (e) => {

  if (e.key === "ArrowRight") {
    next();
  }

  if (e.key === "ArrowLeft") {
    prev();
  }
});

show(0);

/* ===================== DUST GENERATOR ===================== */
function spawnDust() {

  const d = document.createElement("div");

  d.className = "dust";

  d.style.left =
    Math.random() * window.innerWidth + "px";

  d.style.animationDuration =
    (5 + Math.random() * 10) + "s";

  document.body.appendChild(d);

  setTimeout(() => {
    d.remove();
  }, 12000);
}

setInterval(spawnDust, 250);

/* ===================== SCRATCHES ===================== */
const canvas =
  document.getElementById("scratchCanvas");

const ctx =
  canvas.getContext("2d");

function resize() {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);

resize();

function drawScratches() {

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for (let i = 0; i < 6; i++) {

    const x =
      Math.random() * canvas.width;

    const y =
      Math.random() * canvas.height;

    const len =
      120 + Math.random() * 400;

    ctx.strokeStyle =
      "rgba(255,255,255,0.05)";

    ctx.lineWidth = 1;

    ctx.beginPath();

    ctx.moveTo(x, y);

    ctx.lineTo(
      x + (Math.random() - 0.5) * 10,
      y + len
    );

    ctx.stroke();
  }
}

setInterval(drawScratches, 140);
</script>

</body>
</html>
